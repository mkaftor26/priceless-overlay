<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Picture Campaign</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            text-align: center; 
            padding: 2vw; 
            background: #f4f4f9; 
            margin: 0;
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        canvas { 
            max-width: 100%; 
            border: 1px solid #e1e1e1; 
            border-radius: 8px; 
            margin: 20px 0; 
            background-color: #f8f8f8;
        }
        .upload-btn {
            display: inline-block;
            background: #e9ecef;
            color: #333;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        input[type="file"] { display: none; }
        .download-btn { 
            background: #007BFF; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: bold;
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%;
        }
        .download-btn:hover { background: #0056b3; }
        .download-btn:disabled { background: #cccccc; cursor: not-allowed; }
        
        /* Hidden image source for the overlay */
        #overlay-image { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Update Your Profile Picture</h2>
    <p>Show your support! Upload your photo below to add our campaign frame.</p>
    
    <!-- Upload Button -->
    <label class="upload-btn">
        Choose a Photo
        <input type="file" id="upload" accept="image/png, image/jpeg, image/jpg">
    </label>

    <!-- The overlay image file. Make sure overlay.png is in the same folder -->
    <img id="overlay-image" src="overlay.png" crossOrigin="anonymous" alt="Campaign Overlay">

    <!-- Preview Canvas -->
    <canvas id="canvas" width="800" height="800"></canvas>

    <!-- Download Button -->
    <button id="downloadBtn" class="download-btn" disabled>Download Image</button>
</div>

<script>
    const uploadInput = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('downloadBtn');
    const overlayImg = document.getElementById('overlay-image');

    // Canvas settings (Outputs a crisp 800x800 square image)
    const CANVAS_SIZE = 800;

    // Optional: Draw initial placeholder text
    ctx.fillStyle = "#aaa";
    ctx.font = "20px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Your photo will appear here", CANVAS_SIZE/2, CANVAS_SIZE/2);

    uploadInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const userImg = new Image();
            userImg.onload = function() {
                // Clear the placeholder
                ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                // 1. Draw and auto-crop user photo to fill the square (like object-fit: cover)
                const scale = Math.max(CANVAS_SIZE / userImg.width, CANVAS_SIZE / userImg.height);
                const x = (CANVAS_SIZE / 2) - (userImg.width / 2) * scale;
                const y = (CANVAS_SIZE / 2) - (userImg.height / 2) * scale;
                ctx.drawImage(userImg, x, y, userImg.width * scale, userImg.height * scale);

                // 2. Draw the transparent graphic overlay on top
                if (overlayImg.complete) {
                    ctx.drawImage(overlayImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
                    downloadBtn.disabled = false;
                } else {
                    // Fallback to wait if overlay is still loading
                    overlayImg.onload = () => {
                        ctx.drawImage(overlayImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
                        downloadBtn.disabled = false;
                    };
                }
            };
            userImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Handle Download
    downloadBtn.addEventListener('click', function() {
        const link = document.createElement('a');
        link.download = 'campaign-profile-picture.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
